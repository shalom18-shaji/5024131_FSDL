<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
  <meta charset="UTF-8">
  <title>AngularJS Hello World</title>

  <!-- AngularJS CDN -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      width: 420px;
      border-radius: 15px;
      box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      padding: 10px;
      width: 90%;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #667eea;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #5a67d8;
    }

    h2 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      margin-top: 20px;
      font-size: 18px;
      color: #555;
    }
  </style>
</head>

<body>

  <div class="container" ng-controller="MainController">

    <h2>Hello World App</h2>

    <!-- ng-model -->
    <input type="text" ng-model="name" placeholder="Enter your name">

    <!-- button with ng-click -->
    <br>
    <button ng-click="clearName()">Clear Name</button>

    <!-- expression -->
    <p>Hello, {{name}} 👋</p>

  </div>

  <script>
    var app = angular.module("myApp", []);

    app.controller("MainController", function($scope) {
      $scope.name = "World";

      // function for button
      $scope.clearName = function() {
        $scope.name = "";
      };
    });
  </script>

</body>
</html>
